name: "Python dependency audit"

on:
  push:
  pull_request:
  schedule:
    -  cron: "40 3 * * 1"

jobs:
  audit:
    runs-on:  ubuntu-latest

    steps:
      - name:  Checkout repository
        uses:  actions/checkout@v5

      - name:  Run pip-audit
        uses:  pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs:  requirements.txt
          summary:  true
